version: "3.8"

services:
  cassandra:
    image: cassandra:4.1
    container_name: stock-tracker-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=StockTrackerCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: stock-tracker-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stock_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: stock-tracker-backend
    ports:
      - "8000:8000"
    environment:
      - CASSANDRA_HOST=cassandra
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=stock_tracker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    depends_on:
      cassandra:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  ai-worker:
    build: ./ai_worker
    container_name: stock-tracker-ai-worker
    environment:
      - CASSANDRA_HOST=cassandra
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: always

  frontend:
    build: ./frontend
    container_name: stock-tracker-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=ws://localhost:8000/ws/live
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always

volumes:
  cassandra_data:
  postgres_data:
